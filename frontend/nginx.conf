server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy ALL API calls to backend using Docker service name
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # Proxy smart-chat directly
    location /smart-chat {
        proxy_pass http://backend:8000/smart-chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300;
    }

    # Proxy upload
    location /upload {
        proxy_pass http://backend:8000/upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300;
        client_max_body_size 25M;
    }

    # Proxy documents
    location /documents {
        proxy_pass http://backend:8000/documents;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy results
    location /results {
        proxy_pass http://backend:8000/results;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy qa
    location /qa {
        proxy_pass http://backend:8000/qa;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300;
    }

    # Proxy export
    location /export {
        proxy_pass http://backend:8000/export;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy health
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }
}