services:

  postgres:
    image: postgres:15-alpine
    container_name: docparse_postgres
    restart: always
    environment:
      POSTGRES_USER: docparse
      POSTGRES_PASSWORD: docparse123
      POSTGRES_DB: docparse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: docparse_minio
    restart: always
    command: server /data --console-address ":7070"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "7070:7070"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: docparse_redis
    restart: always
    ports:
      - "6379:6379"

  celery_worker:
    build: ./backend
    container_name: docparse_celery
    restart: always
    command: celery -A celery_app worker --loglevel=info --pool=solo
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      DATABASE_URL: postgresql+asyncpg://docparse:docparse123@postgres:5432/docparse_db
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: docparse-documents
      MINIO_SECURE: "False"
      REDIS_URL: redis://redis:6379/0
      TZ: Europe/Berlin
    depends_on:
      - postgres
      - minio
      - redis

  backend:
    build: ./backend
    container_name: docparse_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      DATABASE_URL: postgresql+asyncpg://docparse:docparse123@postgres:5432/docparse_db
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: docparse-documents
      MINIO_SECURE: "False"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - minio
      - redis

  frontend:
    build: ./frontend
    container_name: docparse_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data: