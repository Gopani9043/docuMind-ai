version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: docparse_postgres
    restart: always
    environment:
      POSTGRES_USER: docparse
      POSTGRES_PASSWORD: docparse123
      POSTGRES_DB: docparse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── MinIO File Storage (local S3) ────────────────
  minio:
    image: minio/minio:latest
    container_name: docparse_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # API port
      - "9001:9001"   # Web dashboard port
    volumes:
      - minio_data:/data

# ── Named Volumes (data persists here) ──────────────
volumes:
  postgres_data:
  minio_data: